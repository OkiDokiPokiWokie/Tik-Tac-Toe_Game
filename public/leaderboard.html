<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Stats & Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 2rem;
        }
        .stat-card {
            border-left: 4px solid #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h1>🏆 Stats & Leaderboard</h1>
        <a href="/game.html" class="btn btn-outline-primary">Back to Game</a>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <h3 class="mb-3 text-secondary">🤖 AI Performance</h3>
            <div id="ai-stats-container">
                <div class="text-center text-muted mt-5">
                    <div class="spinner-border spinner-border-sm" role="status"></div>
                    Loading AI Data...
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <h3 class="mb-3 text-secondary">🌍 Global Leaderboard</h3>
            <div class="table-responsive shadow-sm bg-white rounded">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>W</th>
                            <th>L</th>
                            <th>D</th>
                            <th>Win %</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted">
                                <div class="spinner-border spinner-border-sm" role="status"></div>
                                Loading Leaderboard...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="leaderboard.js"></script>
</body>
</html>
